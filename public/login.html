<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Nhật Hạ Admin</title>
    <meta name="description" content="Đăng nhập quản trị Nhật Hạ Store">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
</head>

<body>
    <div class="login-wrapper">
        <!-- Animated background -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>

        <div class="login-card">
            <div class="login-header">
                <div class="brand-icon">NH</div>
                <h1>Nhật Hạ Store</h1>
                <p>Đăng nhập vào trang quản trị</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input type="email" id="email" required placeholder="admin@nhathastore.com" autocomplete="email"
                            autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="password" required placeholder="••••••••"
                            autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password" tabindex="-1">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" id="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="error-message" id="error-message" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    <span id="error-text"></span>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <span class="btn-text">Đăng nhập</span>
                    <div class="btn-spinner" style="display:none;">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <div class="login-footer">
                <p>Nhật Hạ Store Admin CMS</p>
            </div>
        </div>
    </div>

    <script>
        // Redirect to admin if already logged in
        (async function checkAuth() {
            const token = localStorage.getItem('admin_token');
            if (token) {
                try {
                    const res = await fetch('/api/auth/me', {
                        headers: { Authorization: `Bearer ${token}` },
                    });
                    const json = await res.json();
                    if (json.success) {
                        window.location.href = '/';
                        return;
                    }
                } catch (_) { }
                // Token invalid — clear it
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_refresh_token');
                localStorage.removeItem('admin_user');
            }
        })();

        // Login form
        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const btnText = document.querySelector('.btn-text');
        const btnSpinner = document.querySelector('.btn-spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-flex';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const json = await res.json();

                if (json.success) {
                    localStorage.setItem('admin_token', json.data.access_token);
                    localStorage.setItem('admin_refresh_token', json.data.refresh_token);
                    localStorage.setItem('admin_user', JSON.stringify(json.data.user));
                    window.location.href = '/';
                } else {
                    showError(json.error);
                }
            } catch (err) {
                showError('Không thể kết nối server');
            } finally {
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorEl.style.display = 'flex';
            errorEl.style.animation = 'none';
            errorEl.offsetHeight; // trigger reflow
            errorEl.style.animation = 'shake 0.4s ease';
        }

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', () => {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        });
    </script>
</body>

</html>
